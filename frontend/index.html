  <!-- Performance Monitoring -->
  <script>
    // Track page load time
    window.addEventListener('load', function() {
      if (window.performance && window.performance.timing) {
        const loadTime = window.performance.timing.loadEventEnd - window.performance.timing.navigationStart;
        console.log('Page Load Time:', loadTime + 'ms');
        
        // Send to Google Analytics
        if (window.gtag) {
          gtag('event', 'timing_complete', {
            'name': 'page_load',
            'value': loadTime,
            'event_category': 'Performance'
          });
        }
      }
      
      // Manage Service Worker
      if ('serviceWorker' in navigator) {
        // In development, unregister any existing service workers to avoid stale caches and module load errors
        if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
          navigator.serviceWorker.getRegistrations().then((registrations) => {
            for (let registration of registrations) {
              registration.unregister();
              console.log('Development mode: Service Worker unregistered to prevent caching issues.');
            }
          });
        } else {
          // Register Service Worker in production
          navigator.serviceWorker.register('/sw.js')
            .then((registration) => {
              console.log('Service Worker registered:', registration.scope);
            })
            .catch((error) => {
              console.log('Service Worker registration failed:', error);
            });
        }
      }
    });
  </script>
