<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brand Config Test</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 { color: #333; margin-bottom: 30px; }
        .section {
            margin-bottom: 40px;
            padding: 20px;
            background: #f9f9f9;
            border-left: 4px solid #667eea;
            border-radius: 8px;
        }
        .section h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 18px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 500;
        }
        input, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        button {
            background: #667eea;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            margin-right: 10px;
        }
        button:hover {
            background: #5568d3;
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .log {
            background: white;
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 15px;
            margin-top: 15px;
            max-height: 300px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 12px;
        }
        .log-entry {
            padding: 5px 0;
            border-bottom: 1px solid #eee;
        }
        .log-entry:last-child {
            border-bottom: none;
        }
        .log-success { color: #28a745; }
        .log-error { color: #dc3545; }
        .log-info { color: #17a2b8; }
        .status {
            padding: 15px;
            border-radius: 6px;
            margin-top: 15px;
        }
        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .current-config {
            background: white;
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 15px;
            margin-top: 15px;
        }
        .config-row {
            display: flex;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }
        .config-row:last-child {
            border-bottom: none;
        }
        .config-key {
            font-weight: bold;
            width: 150px;
            color: #667eea;
        }
        .config-value {
            flex: 1;
            color: #333;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎨 Brand Configuration Test</h1>

        <!-- Test Brand Settings -->
        <div class="section">
            <h2>📝 Test Brand Settings</h2>
            <div class="form-group">
                <label for="brandName">Brand Name</label>
                <input type="text" id="brandName" value="Canvas & Brush">
            </div>
            <div class="form-group">
                <label for="brandTagline">Brand Tagline</label>
                <textarea id="brandTagline" rows="2">Authentic Art Gallery & E-Commerce Platform</textarea>
            </div>
            <button onclick="testBrandSave()">Save Brand Settings</button>
            <button onclick="loadCurrentConfig()">Load Current Config</button>
            <div id="brandStatus"></div>
        </div>

        <!-- Test Logo Upload -->
        <div class="section">
            <h2>🖼️ Test Logo Upload</h2>
            <div class="form-group">
                <label for="logoFile">Select Logo Image</label>
                <input type="file" id="logoFile" accept="image/*">
            </div>
            <button onclick="testLogoUpload()">Upload Logo</button>
            <div id="logoStatus"></div>
            <div id="logoPreview"></div>
        </div>

        <!-- Current Configuration -->
        <div class="section">
            <h2>📋 Current Configuration</h2>
            <button onclick="loadCurrentConfig()">Refresh Config</button>
            <div id="currentConfig" class="current-config">
                <p style="color: #999;">Load configuration to see current values...</p>
            </div>
        </div>

        <!-- Debug Log -->
        <div class="section">
            <h2>🔍 Debug Log</h2>
            <button onclick="clearLog()">Clear Log</button>
            <div id="log" class="log">
                <div class="log-entry log-info">Ready to test...</div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8000/api';
        const TOKEN = localStorage.getItem('auth_token') || localStorage.getItem('token');

        function addLog(message, type = 'info') {
            const logDiv = document.getElementById('log');
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logDiv.appendChild(entry);
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        function clearLog() {
            document.getElementById('log').innerHTML = '';
        }

        function showStatus(elementId, message, type) {
            const element = document.getElementById(elementId);
            element.className = `status ${type}`;
            element.textContent = message;
        }

        async function testBrandSave() {
            const brandName = document.getElementById('brandName').value;
            const brandTagline = document.getElementById('brandTagline').value;

            addLog(`Saving brand: "${brandName}"`, 'info');

            if (!TOKEN) {
                showStatus('brandStatus', '❌ Not authenticated. Please login first.', 'error');
                addLog('No token found. User must login first.', 'error');
                return;
            }

            try {
                addLog(`POST ${API_URL}/admin/config/brand`, 'info');
                const response = await fetch(`${API_URL}/admin/config/brand`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${TOKEN}`
                    },
                    body: JSON.stringify({ brand_name: brandName, brand_tagline: brandTagline })
                });

                const data = await response.json();
                addLog(`Response status: ${response.status}`, response.ok ? 'success' : 'error');
                addLog(`Response: ${JSON.stringify(data)}`, response.ok ? 'success' : 'error');

                if (response.ok) {
                    showStatus('brandStatus', `✅ Brand saved successfully!\nName: ${brandName}\nTagline: ${brandTagline}`, 'success');
                    // Reload config after save
                    setTimeout(() => loadCurrentConfig(), 1000);
                } else {
                    showStatus('brandStatus', `❌ Error: ${data.message || 'Unknown error'}`, 'error');
                }
            } catch (error) {
                addLog(`Error: ${error.message}`, 'error');
                showStatus('brandStatus', `❌ Error: ${error.message}`, 'error');
            }
        }

        async function testLogoUpload() {
            const fileInput = document.getElementById('logoFile');
            const file = fileInput.files[0];

            if (!file) {
                showStatus('logoStatus', '❌ Please select a logo image', 'error');
                return;
            }

            addLog(`Uploading logo: ${file.name} (${(file.size / 1024).toFixed(2)} KB)`, 'info');

            if (!TOKEN) {
                showStatus('logoStatus', '❌ Not authenticated. Please login first.', 'error');
                return;
            }

            try {
                const formData = new FormData();
                formData.append('logo', file);

                addLog(`POST ${API_URL}/admin/config/upload-logo`, 'info');
                const response = await fetch(`${API_URL}/admin/config/upload-logo`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${TOKEN}`
                    },
                    body: formData
                });

                const data = await response.json();
                addLog(`Response status: ${response.status}`, response.ok ? 'success' : 'error');
                addLog(`Response: ${JSON.stringify(data)}`, response.ok ? 'success' : 'error');

                if (response.ok) {
                    showStatus('logoStatus', `✅ Logo uploaded successfully!\nPath: ${data.logo_path}`, 'success');
                    
                    // Show preview
                    const logoPreviewDiv = document.getElementById('logoPreview');
                    const logoUrl = `http://localhost:8000/storage/${data.logo_path}`;
                    logoPreviewDiv.innerHTML = `<img src="${logoUrl}" alt="Logo" style="max-width: 200px; max-height: 200px; margin-top: 15px; border-radius: 8px;">`;
                    
                    // Reload config
                    setTimeout(() => loadCurrentConfig(), 1000);
                } else {
                    showStatus('logoStatus', `❌ Error: ${data.message || 'Unknown error'}`, 'error');
                }
            } catch (error) {
                addLog(`Error: ${error.message}`, 'error');
                showStatus('logoStatus', `❌ Error: ${error.message}`, 'error');
            }
        }

        async function loadCurrentConfig() {
            addLog('Fetching current configuration...', 'info');

            try {
                const response = await fetch(`${API_URL}/admin/config/all`);
                const data = await response.json();

                addLog('Configuration loaded successfully', 'success');

                // Display config
                const configDiv = document.getElementById('currentConfig');
                let html = '';

                const branding = data.branding || {};
                html += '<h3 style="margin-top: 0; color: #667eea;">Branding</h3>';
                html += `<div class="config-row"><div class="config-key">Brand Name:</div><div class="config-value">${branding.brand_name || 'Not set'}</div></div>`;
                html += `<div class="config-row"><div class="config-key">Brand Tagline:</div><div class="config-value">${branding.brand_tagline || 'Not set'}</div></div>`;
                html += `<div class="config-row"><div class="config-key">Site Logo:</div><div class="config-value">${branding.site_logo || 'Not set'}</div></div>`;

                configDiv.innerHTML = html;

                // Update inputs with current values
                document.getElementById('brandName').value = branding.brand_name || '';
                document.getElementById('brandTagline').value = branding.brand_tagline || '';

                // Show logo if exists
                if (branding.site_logo) {
                    const logoUrl = `http://localhost:8000/storage/${branding.site_logo}`;
                    const logoPreviewDiv = document.getElementById('logoPreview');
                    logoPreviewDiv.innerHTML = `<img src="${logoUrl}" alt="Current Logo" style="max-width: 200px; max-height: 200px; margin-top: 15px; border-radius: 8px;">`;
                }

            } catch (error) {
                addLog(`Error loading config: ${error.message}`, 'error');
                document.getElementById('currentConfig').innerHTML = `<p style="color: #dc3545;">Error: ${error.message}</p>`;
            }
        }

        // Load config on page load
        window.addEventListener('load', () => {
            if (TOKEN) {
                addLog('✅ Token found in localStorage', 'success');
                loadCurrentConfig();
            } else {
                addLog('❌ No token found. Please login to admin panel first.', 'error');
            }
        });
    </script>
</body>
</html>
