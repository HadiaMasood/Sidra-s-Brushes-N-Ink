<!DOCTYPE html>
<html>
<head>
    <title>Test Category API</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        .result { margin: 20px 0; padding: 10px; border: 1px solid #ccc; }
        .success { background: #d4edda; }
        .error { background: #f8d7da; }
        pre { background: #f5f5f5; padding: 10px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>Test Category API</h1>
    
    <button onclick="testCategory()">Test "Cute Aesthetic Cartoon Characters"</button>
    <button onclick="testCategoryID()">Test Category ID 4</button>
    <button onclick="testAll()">Test "All"</button>
    
    <div id="results"></div>
    
    <script>
        const API_URL = 'http://localhost:8000/api';
        
        async function testCategory() {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<p>Testing category name...</p>';
            
            try {
                const url = `${API_URL}/artworks?category=Cute Aesthetic Cartoon Characters&page=1`;
                console.log('Request URL:', url);
                
                const response = await fetch(url);
                const data = await response.json();
                
                console.log('Response:', data);
                
                resultsDiv.innerHTML = `
                    <div class="result success">
                        <h3>✓ Category Name Test</h3>
                        <p><strong>URL:</strong> ${url}</p>
                        <p><strong>Status:</strong> ${response.status}</p>
                        <p><strong>Total Results:</strong> ${data.total || data.data?.length || 0}</p>
                        <p><strong>Current Page:</strong> ${data.current_page || 'N/A'}</p>
                        <p><strong>Data Count:</strong> ${data.data?.length || 0}</p>
                        ${data.data?.length > 0 ? `<p><strong>First Item:</strong> ${data.data[0].title}</p>` : ''}
                        <pre>${JSON.stringify(data, null, 2).substring(0, 500)}...</pre>
                    </div>
                `;
            } catch (error) {
                console.error('Error:', error);
                resultsDiv.innerHTML = `
                    <div class="result error">
                        <h3>✗ Error</h3>
                        <p>${error.message}</p>
                    </div>
                `;
            }
        }
        
        async function testCategoryID() {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<p>Testing category ID...</p>';
            
            try {
                const url = `${API_URL}/artworks?category=4&page=1`;

                        ${data.data?.length > 0 ? `<p><strong>First Item:</strong> ${data.data[0].title}</p>` : ''}
                        <pre>${JSON.stringify(data, null, 2).substring(0, 500)}...</pre>
                    </div>
                `;
            } catch (error) {
                console.error('Error:', error);
                resultsDiv.innerHTML = `
                    <div class="result error">
                        <h3>✗ Error</h3>
                        <p>${error.message}</p>
                    </div>
                `;
            }
        }
        
        async function testAll() {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<p>Testing "All" category...</p>';
            
            try {
                const url = `${API_URL}/artworks?category=All&page=1`;
                console.log('Request URL:', url);
                
                const response = await fetch(url);
                const data = await response.json();
                
                console.log('Response:', data);

                    <div class="result success">

                        <p><strong>URL:</strong> ${url}</p>

                        <pre>${JSON.stringify(data, null, 2).substring(0, 500)}...</pre>
                    </div>
                `;
            } catch (error) {
                console.error('Error:', error);
                resultsDiv.innerHTML = `
                    <div class="result error">
                        <h3>✗ Error</h3>
                        <p>${error.message}</p>
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
